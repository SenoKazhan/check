[pytest]
# Пути к тестам
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Асинхронные тесты
asyncio_mode = auto

# Плагины
addopts = 
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    -v

# Маркеры для категоризации тестов
markers =
    unit: Модульные тесты (быстрые, изолированные)
    integration: Интеграционные тесты (с БД, API)
    e2e: End-to-End тесты (полный сценарий)
    slow: Медленные тесты (исключать при быстром прогоне)
    cv: Тесты компьютерного зрения
    packing: Тесты алгоритма упаковки

# Фильтрация предупреждений
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning